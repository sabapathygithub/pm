<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM MVP Backend Hello</title>
    <style>
      :root {
        --navy: #032147;
        --blue: #209dd7;
        --purple: #753991;
        --yellow: #ecad0a;
        --gray: #888888;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(160deg, #f8fbff, #eef5ff);
        color: var(--navy);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(680px, 95vw);
        background: white;
        border: 2px solid #dbe8f7;
        border-top: 6px solid var(--yellow);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(3, 33, 71, 0.1);
      }
      h1 {
        margin: 0;
        font-size: 1.7rem;
      }
      p {
        margin: 10px 0 0;
        color: var(--gray);
      }
      button {
        margin-top: 20px;
        background: var(--purple);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #5f2f74;
      }
      code {
        display: block;
        margin-top: 14px;
        border-radius: 10px;
        background: #f2f8ff;
        border: 1px solid #dbe8f7;
        color: var(--blue);
        padding: 12px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1>Backend Hello World is running</h1>
        <p>
          This page is served by FastAPI from <code>backend/static/index.html</code>.
        </p>
        <button id="api-button" type="button">Call /api/hello</button>
        <code id="api-result">Click the button to call the backend API.</code>
      </section>
    </div>

    <script>
      const button = document.getElementById("api-button");
      const result = document.getElementById("api-result");

      button.addEventListener("click", async () => {
        result.textContent = "Calling /api/hello ...";

        try {
          const response = await fetch("/api/hello");
          const payload = await response.json();
          result.textContent = JSON.stringify(payload, null, 2);
        } catch (error) {
          result.textContent = "Request failed: " + String(error);
        }
      });
    </script>
  </body>
</html>
